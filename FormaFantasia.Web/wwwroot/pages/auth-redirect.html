<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>A entrar... | FormaFantasia</title>
<style>
body{font-family:'Inter',sans-serif;background:#faf8f4;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.msg{text-align:center;color:#5a5a5a;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #e8e2d5;border-top-color:#5c7a5c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  A entrar na tua conta...
</div>
<script>
(async function(){
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || 'index.html';
  try {
    const r = await fetch('/api/Utilizadores/auth', {credentials:'include'});
    const d = await r.json();
    if(d.isAuthenticated){
      if(d.role === 'Admin'){
        window.location.href = '/pages/admin.html';
      } else {
        window.location.href = '/pages/' + redirect;
      }
    } else {
      window.location.href = '/pages/login.html';
    }
  } catch(e){
    window.location.href = '/pages/login.html';
  }
})();
</script>
</body>
</html>
